<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Dashboard</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 20px;
    }
    h1, h2 { margin: 0.3em 0; }
    .announce {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
    }
    .announce input {
        flex: 1;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #eee;
    }
    .announce button {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        background: #4f7cff;
        color: white;
        cursor: pointer;
    }
    .announce button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .cards {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
    }
    .card {
        background: #1c1c1c;
        border-radius: 10px;
        padding: 16px 24px;
        text-align: center;
    }
    #servers, #logs {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 24px;
    }
    .server, .log {
        background: #1c1c1c;
        border-radius: 8px;
        padding: 12px;
    }
    .player {
        display: inline-block;
        background: #2a2a2a;
        border-radius: 6px;
        padding: 2px 8px;
        margin: 2px;
    }
</style>
</head>
<body>

<div class="announce">
    <input id="msg" placeholder="Type an announcement..." onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">Send</button>
</div>

<h1>Roblox Dashboard</h1>
<div class="cards">
    <div class="card">
        <h2>Servers</h2>
        <h1 id="serverCount">0</h1>
    </div>
    <div class="card">
        <h2>Players</h2>
        <h1 id="playerCount">0</h1>
    </div>
    <div class="card">
        <h2>Logs</h2>
        <h1 id="logCount">0</h1>
    </div>
</div>

<h2>Live Servers</h2>
<div id="servers"></div>

<h2>Logs</h2>
<div id="logs"></div>

<script>
async function send() {
    const input = document.getElementById("msg");
    const btn = document.getElementById("sendBtn");
    const message = input.value.trim();
    if (!message) return;

    btn.disabled = true;
    try {
        const res = await fetch("/announcement", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
        });
        if (!res.ok) throw new Error("Request failed");
        input.value = "";
    } catch (err) {
        console.error("Failed to send announcement:", err);
        alert("Failed to send announcement.");
    } finally {
        btn.disabled = false;
    }
}
</script>

<script src="script.js"></script>
</body>
</html>
