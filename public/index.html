<!DOCTYPE html>
<html>
<body>
<h1> ducki's http message sender</h1>

<input id="msg">

<button onclick="send()">
Send
</button>

<script>

async function send(){

    await fetch("/announcement",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            message:document.getElementById("msg").value

        })

    });

}

</script>

</body>
</html>
