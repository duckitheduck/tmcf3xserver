<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2> ducki's http message sender</h2>

    
<div class="container">
    <input id="msg" placeholder="enter msg here...">

    <button onclick="send()">
        Send
    </button>
</div>

<script>
async function send() {
    await fetch("/announcement", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: document.getElementById("msg").value
        })
    });
}
</script>

</body>
</html>
